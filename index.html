                         !SUPABASE_ANON_KEY.includes('YOUR-ANON');

    let sb = null;

      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    // Storage API backed by Supabase (replaces localStorage)
    window.storage = {
      async get(key) {
        if (!sb) return null;
        const { data, error } = await sb.from('payroll_data').select('value').eq('key', key).maybeSingle();
        if (error) { console.error('storage.get', error); return null; }
        if (!data) return null;
        return { key, value: data.value, shared: true };
      },
      async set(key, value) {
        if (!sb) throw new Error('Supabase niet geconfigureerd');
        const { error } = await sb.from('payroll_data').upsert({ key, value, updated_at: new Date().toISOString() });
        if (error) throw error;
        return { key, value, shared: true };
      },
      async delete(key) {
        if (!sb) throw new Error('Supabase niet geconfigureerd');
        const { error } = await sb.from('payroll_data').delete().eq('key', key);
        if (error) throw error;
        return { key, deleted: true, shared: true };
      },
      async list(prefix = '') {
        if (!sb) return { keys: [], prefix, shared: true };
        const { data, error } = await sb.from('payroll_data').select('key').like('key', prefix + '%');
        if (error) { console.error('storage.list', error); return { keys: [], prefix, shared: true }; }
        return { keys: data.map(r => r.key), prefix, shared: true };
      }
    };

    // Backup helpers

      try {
        const { data, error } = await sb.from('payroll_data').select('*');

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });

        const date = new Date().toISOString().slice(0, 10);

        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('Backup mislukt: ' + e.message);
      }

    const MONTHS_NL = [

    function parseTime(str) {
      if (str === undefined || str === null) return 0;
      const s = String(str).trim();
      if (!s) return 0;
      const parts = s.split(":").map(p => parseInt(p, 10) || 0);
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      if (parts.length === 2) return parts[0] * 3600 + parts[1] * 60; // HH:MM
      if (parts.length === 1) {
        const f = parseFloat(s.replace(',', '.'));
        if (!isNaN(f)) return Math.round(f * 3600);
      }
      return 0;
    }

    function formatSecs(secs) {
      if (!secs || secs <= 0) return '';
      const total = Math.round(secs);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      if (s === 0) return `${h}:${String(m).padStart(2, '0')}`;
      return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function secsToHours(secs) { return (secs || 0) / 3600; }

    /* ---------- Payout pots ---------- */
    const POT_KEYS = ['shenifaCashEur', 'shenifaBankEur', 'anouskaBankEur', 'shenifaCashSrd', 'shenifaBankSrd'];
    const POT_LABELS = {
      shenifaCashEur: 'Shenifa cash (€)',

    };
    const POT_META = {
      shenifaCashEur: { holder: 'Shenifa', method: 'cash', currency: 'EUR' },
      shenifaBankEur: { holder: 'Shenifa', method: 'rekening', currency: 'EUR' },
      anouskaBankEur: { holder: 'Anouska', method: 'rekening', currency: 'EUR' },
      shenifaCashSrd: { holder: 'Shenifa', method: 'cash', currency: 'SRD' },

    };
    function emptyFunds() {
      return POT_KEYS.reduce((o, k) => { o[k] = 0; return o; }, {});
    }
    function eligiblePotsFor(agent) {
      // Cash pots are always possible regardless of the agent's account currency.
      // Bank pots only when the pot's currency matches the agent's account currency
      // (you can't transfer EUR to an SRD account or vice versa).
      const accountCurrency = agent.accountCurrency || 'EUR';
      return POT_KEYS.filter(k => {
        const m = POT_META[k];
        if (m.method === 'cash') return true;
        return m.currency === accountCurrency;
      });
    }
    function potDebit(eurAmount, potKey, exchangeRate) {
      // EUR pots: debit is the EUR amount itself.
      // SRD pots: debit is eurAmount * exchangeRate (in SRD).
      if (POT_META[potKey]?.currency === 'SRD') {
        const r = Number(exchangeRate) || 0;
        return eurAmount * r;
      }
      return eurAmount;
    }
    function prevMonth(ym) {
      if (!ym) return ym;
      const [y, m] = ym.split('-').map(Number);
      const d = new Date(y, m - 2, 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }
    function fmtSrd(n) { return 'SRD ' + (n || 0).toFixed(2).replace('.', ','); }
    function fmtMoney(n, currency) { return currency === 'SRD' ? fmtSrd(n) : fmtEuro(n); }

    function fmtHours(h) {
      return (h || 0).toFixed(2).replace('.', ',');
    }

    function fmtEuro(n) {
      const v = n || 0;
      return '€ ' + v.toFixed(2).replace('.', ',');
    }

    function fmtMonth(ym) {
      if (!ym) return '';
      const [y, m] = ym.split('-');
      return `${MONTHS_NL[parseInt(m, 10) - 1]} ${y}`;
    }

    function calcBonus(sales, tiers) {
      if (!sales || !tiers || tiers.length === 0) return 0;
      const applicable = tiers
        .filter(t => sales >= (Number(t.minSales) || 0))
        .sort((a, b) => (Number(b.minSales) || 0) - (Number(a.minSales) || 0));
      if (applicable.length === 0) return 0;
      const t = applicable[0];
      const min = Number(t.minSales) || 0;
      const max = Number(t.maxSales) || sales;
      const base = Number(t.base) || 0;
      const perSale = Number(t.perSale) || 0;
      const cappedSales = Math.min(sales, max);
      return base + Math.max(0, cappedSales - min) * perSale;
    }

    function calcHourBonus(qualifyingHours, tiers) {
      if (!qualifyingHours || !tiers || tiers.length === 0) return { amount: 0, tier: null };
      const applicable = tiers
        .filter(t => qualifyingHours >= (Number(t.minHours) || 0))
        .sort((a, b) => (Number(b.minHours) || 0) - (Number(a.minHours) || 0));
      if (applicable.length === 0) return { amount: 0, tier: null };
      const t = applicable[0];
      return { amount: Number(t.amount) || 0, tier: t };
    }

    function genId() {

    function detectColumns(headers) {
      const result = {};
      for (const [key, keywords] of Object.entries(COL_KEYWORDS)) {
        const found = headers.find(h => {
          const lower = String(h).toLowerCase();
          return keywords.some(k => lower.includes(k));
        });
        if (found) result[key] = found;
      }
      return result;
    }

    // Returns lowercased keys an agent matches on: nickname + full name

      const keys = [];
      const nick = (agent.nickname || '').trim().toLowerCase();

      if (nick) keys.push(nick);

    function PayrollDashboard() {

              setTimeEntries([]); setHolidays([]); setAgentMonthData({});
            }
          } catch (e) {
            setTimeEntries([]); setHolidays([]); setAgentMonthData({});
          }

          // Payout data: load saved if present, else carry over remaining funds from previous month
          if (savedPayout && savedPayout.funds) {
            setPayoutData({
              funds: { ...emptyFunds(), ...(savedPayout.funds || {}) },
              payouts: savedPayout.payouts || {},
              saldoRate: Number(savedPayout.saldoRate) || 0,
            });
          } else {
            try {
              const prev = prevMonth(currentMonth);
              const prevR = await window.storage.get(`month:${prev}`);
              if (prevR) {
                const prevParsed = JSON.parse(prevR.value);
                const pp = prevParsed.payoutData;
                if (pp && pp.funds) {
                  // Remaining = startFunds - paidOut per pot (in pot's own currency)
                  const paidByPot = POT_KEYS.reduce((o, k) => { o[k] = 0; return o; }, {});
                  Object.values(pp.payouts || {}).forEach(p => {
                    if (p && p.paid && p.paidBy && paidByPot[p.paidBy] !== undefined) {
                      const eur = Number(p.amount) || 0;
                      paidByPot[p.paidBy] += potDebit(eur, p.paidBy, p.exchangeRate);
                    }
                  });
                  const remaining = POT_KEYS.reduce((o, k) => {
                    o[k] = Math.max(0, (Number(pp.funds[k]) || 0) - paidByPot[k]);
                    return o;
                  }, {});
                  setPayoutData({ funds: remaining, payouts: {}, saldoRate: Number(pp.saldoRate) || 0 });
                } else {
                  setPayoutData({ funds: emptyFunds(), payouts: {}, saldoRate: 0 });
                }
              } else {
                setPayoutData({ funds: emptyFunds(), payouts: {}, saldoRate: 0 });
              }
            } catch (e) {
              setPayoutData({ funds: emptyFunds(), payouts: {}, saldoRate: 0 });
            }
          }
        })();
      }, [currentMonth, loading]);

      /* ---------- CSV upload ---------- */
      function handleCsvUpload(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        const replace = timeEntries.length === 0 || confirm('Bestaande uren-regels vervangen met de nieuwe CSV?\n(Annuleren = toevoegen aan bestaande regels)');
        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: (res) => {
            const headers = res.meta.fields || [];
            const cols = detectColumns(headers);
            if (!cols.name) {
              notify('Kolom met naam niet gevonden in CSV', 'error');
              return;
            }
            const newEntries = [];
            for (const row of res.data) {
              const name = String(row[cols.name] || '').trim();
              if (!name) continue;
              const projectName = cols.project ? String(row[cols.project] || '').trim() : '';
              newEntries.push({
                id: genId(),
                agentKey: name.toLowerCase(),
                agentDisplayName: name,
                projectName,
                sales: cols.sales ? (parseFloat(String(row[cols.sales]).replace(',', '.')) || 0) : 0,
                begeleiding: cols.begeleiding ? parseTime(row[cols.begeleiding]) : 0,
                nawerktijd: cols.nawerktijd ? parseTime(row[cols.nawerktijd]) : 0,
                inGesprek: cols.inGesprek ? parseTime(row[cols.inGesprek]) : 0,
                uitbellend: cols.uitbellend ? parseTime(row[cols.uitbellend]) : 0,
                beschikbaar: cols.beschikbaar ? parseTime(row[cols.beschikbaar]) : 0
              });
            }
            setTimeEntries(prev => replace ? newEntries : [...prev, ...newEntries]);
            // Calculate match counts
            const knownKeys = new Set();
            agents.forEach(ag => agentMatchKeys(ag).forEach(k => knownKeys.add(k)));
            const uniqueCsvKeys = new Set(newEntries.map(e => e.agentKey));
            const matched = Array.from(uniqueCsvKeys).filter(k => knownKeys.has(k)).length;
            const unmatched = uniqueCsvKeys.size - matched;
            const bits = [];
            if (!cols.project) bits.push('geen projectkolom');
            if (!cols.sales) bits.push('geen sales-kolom');
            const projectMsg = bits.length ? ` (${bits.join(', ')})` : '';
            notify(`${newEntries.length} regel(s), ${uniqueCsvKeys.size} agents · ${matched} gematcht, ${unmatched} onbekend${projectMsg}`);
          },
          error: (err) => notify('CSV-fout: ' + err.message, 'error')
        });
        e.target.value = '';
      }

      /* ---------- Payouts ---------- */
      function updateFund(potKey, amount) {

      function autoAssignPayouts(agents, computeAgentPayroll) {
        const today = new Date().toISOString().slice(0, 10);
        // All wages are in EUR; SRD pots only apply when an exchange rate is set later.
        const wages = agents.map(a => {
          const calc = computeAgentPayroll(a);
          const method = a.payoutMethod || 'rekening';
          return { agent: a, amount: calc.totalGross, method };
        }).filter(w => w.amount > 0);

        // Cash agents first (drain cash pots) and larger amounts first within group.
        wages.sort((x, y) => {
          if (x.method !== y.method) return x.method === 'cash' ? -1 : 1;
          return y.amount - x.amount;
        });

        const remaining = { ...payoutData.funds };
        const newPayouts = { ...payoutData.payouts };

        wages.forEach(w => {
          // Auto-assign uses EUR pots only (wages are EUR; SRD requires manual rate).
          const eurEligible = eligiblePotsFor(w.agent).filter(k => POT_META[k].currency === 'EUR');
          if (eurEligible.length === 0) return;
          // Prefer agent's default method first.
          const preferred = eurEligible.filter(k => POT_META[k].method === w.method);
          const fallback = eurEligible.filter(k => POT_META[k].method !== w.method);
          const ordered = [...preferred, ...fallback];
          let pick = ordered.find(k => remaining[k] >= w.amount);
          if (!pick) pick = ordered.slice().sort((a, b) => remaining[b] - remaining[a])[0];
          remaining[pick] = (remaining[pick] || 0) - w.amount;
          newPayouts[w.agent.id] = {
            ...(newPayouts[w.agent.id] || {}),
            paidBy: pick,
            amount: w.amount,
            paidAt: newPayouts[w.agent.id]?.paidAt || today,
            paid: newPayouts[w.agent.id]?.paid || false,
          };
        });

        setPayoutData(pd => ({ ...pd, payouts: newPayouts }));
        notify('Uitbetalingen automatisch toegewezen');
      }

        setPayoutData(pd => ({ ...pd, payouts: {} }));

      /* ---------- Compute payroll for agent ---------- */
      function computeAgentPayroll(agent) {
        const keys = agentMatchKeys(agent);
        const keySet = new Set(keys);
        const entries = timeEntries.filter(e => keySet.has(e.agentKey));

        // Per-project group
        const groupMap = {};
        let totalSecs = 0;
        for (const e of entries) {
          const projName = e.projectName?.trim() || 'Geen project';
          if (!groupMap[projName]) {
            groupMap[projName] = {
              projectName: projName,
              begeleiding: 0, nawerktijd: 0, inGesprek: 0, uitbellend: 0, beschikbaar: 0, totalSecs: 0,
              sales: 0
            };
          }
          const g = groupMap[projName];
          g.begeleiding += e.begeleiding || 0;
          g.nawerktijd += e.nawerktijd || 0;
          g.inGesprek += e.inGesprek || 0;
          g.uitbellend += e.uitbellend || 0;
          g.beschikbaar += e.beschikbaar || 0;
          g.sales += Number(e.sales) || 0;
          const s = entryTotalSecs(e);
          g.totalSecs += s;
          totalSecs += s;
        }
        const projectGroups = Object.values(groupMap);

        const workHours = secsToHours(totalSecs);
        const wage = Number(agent.hourlyWage) || 0;
        const workPay = workHours * wage;

        const receivesHolidayPay = agent.holidayPayEnabled !== false;
        const totalHolidayHours = receivesHolidayPay
          ? holidays.reduce((s, h) => s + (Number(h.hoursPerAgent) || 0), 0)
          : 0;
        const holidayPay = totalHolidayHours * wage;

        const md = getAgentMD(agent.id);
        const incHours = Number(md.incentiveHours) || 0;
        const incentivePay = incHours * wage;

        // Combine sales: sum from time entries + manual override (md.sales overrides if set)
        const projectBonuses = projects.map(p => {
          // Match project-name-from-CSV to configured project (case insensitive)
          const matchingGroup = projectGroups.find(g =>
            g.projectName.trim().toLowerCase() === (p.name || '').trim().toLowerCase()
          );
          const csvSales = matchingGroup ? matchingGroup.sales : 0;
          const manualSales = md.sales?.[p.id];
          const sales = (manualSales !== undefined && manualSales !== null && manualSales !== '')
            ? Number(manualSales) || 0
            : csvSales;
          return {
            projectId: p.id,
            projectName: p.name,
            sales,
            fromCsv: manualSales === undefined || manualSales === null || manualSales === '',
            bonus: calcBonus(sales, p.tiers)
          };
        }).filter(pb => pb.sales > 0 || pb.bonus > 0);

        const totalProjectBonus = projectBonuses.reduce((s, b) => s + b.bonus, 0);
        const totalManualBonus = (md.manualBonuses || []).reduce((s, b) => s + (Number(b.amount) || 0), 0);

        // System outages
        const systemOutages = md.systemOutages || [];
        const outageHours = systemOutages.reduce((s, o) => s + (Number(o.hours) || 0), 0);
        const outagePay = outageHours * wage;

        // Toilet allowance — every agent gets it automatically
        const toiletHours = Number(toiletAllowanceHours) || 0;
        const toiletPay = toiletHours * wage;

        // Hour bonus — work + incentive + outage hours count
        const qualifyingHours = workHours + incHours + outageHours;
        const hourBonusResult = calcHourBonus(qualifyingHours, hourBonusTiers);
        const hourBonusAmount = hourBonusResult.amount;

        // Fixed monthly allowances per agent (responsibility, phone credit, etc.)
        const fixedAllowances = agent.fixedAllowances || [];
        const totalFixedAllowances = fixedAllowances.reduce((s, a) => s + (Number(a.amount) || 0), 0);

        const totalGross = workPay + holidayPay + incentivePay + outagePay + toiletPay
          + totalProjectBonus + totalManualBonus + hourBonusAmount + totalFixedAllowances;

        return {
          workHours, workPay, wage,
          projectGroups,
          totalHolidayHours, holidayPay,
          incentiveHours: incHours, incentivePay,
          systemOutages, outageHours, outagePay,
          toiletHours, toiletPay,
          qualifyingHours, hourBonus: hourBonusAmount, hourBonusTier: hourBonusResult.tier,
          projectBonuses, totalProjectBonus,
          manualBonuses: md.manualBonuses || [],
          totalManualBonus,
          fixedAllowances, totalFixedAllowances,
          totalGross
        };
      }

      /* ---------- PDF generation ---------- */
      function buildPdfDoc(agent) {
        if (!window.jspdf) { notify('PDF library nog aan het laden...', 'error'); return null; }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a4' });
        const c = computeAgentPayroll(agent);
        const monthLabel = fmtMonth(currentMonth);

        const PAGE_W = 210, PAGE_H = 297, MARGIN = 18;
        const ACCENT = [31, 61, 46], INK = [20, 20, 20], MUTED = [120, 120, 120];

        doc.setFillColor(...ACCENT); doc.rect(0, 0, PAGE_W, 6, 'F');

        let logoBottom = MARGIN;
        if (company.logo) {
          try { doc.addImage(company.logo, MARGIN, MARGIN, 24, 24, undefined, 'FAST'); logoBottom = MARGIN + 24; }
          catch (e) { /* ignore */ }
        }

        doc.setTextColor(...INK);
        doc.setFont('helvetica', 'bold'); doc.setFontSize(18);
        doc.text(company.name || 'Bedrijf', PAGE_W - MARGIN, MARGIN + 6, { align: 'right' });
        doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(...MUTED);
        doc.text('LOONSTROOK', PAGE_W - MARGIN, MARGIN + 12, { align: 'right' });
        doc.setFont('helvetica', 'bold'); doc.setTextColor(...INK);
        doc.text(monthLabel, PAGE_W - MARGIN, MARGIN + 18, { align: 'right' });

        let y = Math.max(logoBottom, MARGIN + 24) + 10;

        doc.setDrawColor(220, 220, 215); doc.setLineWidth(0.3);
        doc.line(MARGIN, y, PAGE_W - MARGIN, y); y += 8;

        doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(...MUTED);
        doc.text('MEDEWERKER', MARGIN, y);
        doc.text('UURLOON', PAGE_W - MARGIN, y, { align: 'right' });
        y += 5;
        doc.setFont('helvetica', 'bold'); doc.setFontSize(13); doc.setTextColor(...INK);
        doc.text(agent.name, MARGIN, y);
        doc.text(fmtEuro(c.wage), PAGE_W - MARGIN, y, { align: 'right' });
        y += 12;

        function ensureSpace(needed) {
          if (y + needed > PAGE_H - 35) { doc.addPage(); y = MARGIN; }
        }
        function sectionHeader(label) {
          ensureSpace(12);
          doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(...ACCENT);
          doc.text(label.toUpperCase(), MARGIN, y); y += 1.5;
          doc.setDrawColor(...ACCENT); doc.setLineWidth(0.4);
          doc.line(MARGIN, y, PAGE_W - MARGIN, y); y += 5;
        }
        function row(label, qty, rate, amount, bold = false, indent = 0) {
          ensureSpace(7);
          doc.setFont('helvetica', bold ? 'bold' : 'normal'); doc.setFontSize(10); doc.setTextColor(...INK);
          doc.text(label, MARGIN + indent, y);
          if (qty) { doc.setTextColor(...MUTED); doc.text(qty, MARGIN + 100, y, { align: 'right' }); }
          if (rate) { doc.setTextColor(...MUTED); doc.text(rate, MARGIN + 135, y, { align: 'right' }); }
          doc.setTextColor(...INK); doc.text(amount, PAGE_W - MARGIN, y, { align: 'right' });
          y += 6;
        }

        // Werkuren per project
        sectionHeader('Werkuren');
        if (c.projectGroups.length === 0) {
          row('Geen uren geregistreerd', '', '', fmtEuro(0));
        } else {
          c.projectGroups.forEach(g => {
            const gHours = secsToHours(g.totalSecs);
            const gPay = gHours * c.wage;
            row(g.projectName, fmtHours(gHours) + ' uur', fmtEuro(c.wage), fmtEuro(gPay));
            // sub-rows
            doc.setFontSize(9); doc.setTextColor(...MUTED);
            TIME_FIELDS.forEach(([k, label]) => {
              if (g[k] > 0) {
                ensureSpace(5);
                doc.text(`· ${label}: ${fmtHours(secsToHours(g[k]))} uur`, MARGIN + 4, y);
                y += 4.5;
              }
            });
            y += 1;
          });
          doc.setDrawColor(230, 230, 225); doc.setLineWidth(0.2);
          doc.line(MARGIN, y - 2, PAGE_W - MARGIN, y - 2);
          row('Totaal werkuren', fmtHours(c.workHours) + ' uur', '', fmtEuro(c.workPay), true);
        }
        y += 3;

        if (holidays.length > 0 && c.totalHolidayHours > 0) {
          sectionHeader('Feestdagen');
          holidays.forEach(h => {
            const hours = Number(h.hoursPerAgent) || 0;
            row(h.name || h.date || 'Feestdag', fmtHours(hours) + ' uur', fmtEuro(c.wage), fmtEuro(hours * c.wage));
          });
          doc.setDrawColor(230, 230, 225);
          doc.line(MARGIN, y - 2, PAGE_W - MARGIN, y - 2);
          row('Totaal feestdagen', fmtHours(c.totalHolidayHours) + ' uur', '', fmtEuro(c.holidayPay), true);
          y += 3;
        }

        if (c.incentiveHours > 0) {
          sectionHeader('Incentive uren');
          row('Incentive uren', fmtHours(c.incentiveHours) + ' uur', fmtEuro(c.wage), fmtEuro(c.incentivePay));
          y += 3;
        }

        if (c.systemOutages.length > 0) {
          sectionHeader('Systeemstoringen');
          c.systemOutages.forEach(o => {
            const hrs = Number(o.hours) || 0;
            row(o.description || 'Systeemstoring', fmtHours(hrs) + ' uur', fmtEuro(c.wage), fmtEuro(hrs * c.wage));
          });
          doc.setDrawColor(230, 230, 225);
          doc.line(MARGIN, y - 2, PAGE_W - MARGIN, y - 2);
          row('Totaal systeemstoringen', fmtHours(c.outageHours) + ' uur', '', fmtEuro(c.outagePay), true);
          y += 3;
        }

        if (c.toiletHours > 0) {
          sectionHeader('Toiletvergoeding');
          row('Toiletvergoeding', fmtHours(c.toiletHours) + ' uur', fmtEuro(c.wage), fmtEuro(c.toiletPay));
          y += 3;
        }

        if (c.fixedAllowances.length > 0) {
          sectionHeader('Vaste vergoedingen');
          c.fixedAllowances.forEach(al => {
            row(al.description || 'Vergoeding', '', '', fmtEuro(Number(al.amount) || 0));
          });
          if (c.fixedAllowances.length > 1) {
            doc.setDrawColor(230, 230, 225);
            doc.line(MARGIN, y - 2, PAGE_W - MARGIN, y - 2);
            row('Totaal vaste vergoedingen', '', '', fmtEuro(c.totalFixedAllowances), true);
          }
          y += 3;
        }

        if (c.projectBonuses.length > 0) {
          sectionHeader('Project bonussen');
          c.projectBonuses.forEach(pb => row(pb.projectName, pb.sales + ' sales', '', fmtEuro(pb.bonus)));
          doc.setDrawColor(230, 230, 225);
          doc.line(MARGIN, y - 2, PAGE_W - MARGIN, y - 2);
          row('Totaal projectbonussen', '', '', fmtEuro(c.totalProjectBonus), true);
          y += 3;
        }

        if (c.hourBonus > 0) {
          sectionHeader('Uren-bonus');
          const tier = c.hourBonusTier;
          const label = `Uren-bonus (vanaf ${tier?.minHours || 0} uur)`;
          row(label, fmtHours(c.qualifyingHours) + ' uur', '', fmtEuro(c.hourBonus));
          y += 3;
        }

        if (c.manualBonuses.length > 0) {
          sectionHeader('Incentive bonussen');
          c.manualBonuses.forEach(b => {
            const label = b.description || 'Bonus';
            const salesQty = b.sales ? `${b.sales} sales` : '';
            row(label, salesQty, '', fmtEuro(Number(b.amount) || 0));
          });
          doc.setDrawColor(230, 230, 225);
          doc.line(MARGIN, y - 2, PAGE_W - MARGIN, y - 2);
          row('Totaal incentive bonussen', '', '', fmtEuro(c.totalManualBonus), true);
          y += 3;
        }

        ensureSpace(22);
        y += 4;
        doc.setFillColor(...ACCENT); doc.rect(MARGIN, y, PAGE_W - 2 * MARGIN, 16, 'F');
        doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'normal'); doc.setFontSize(11);
        doc.text('TOTAAL BRUTO', MARGIN + 4, y + 10);
        doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
        doc.text(fmtEuro(c.totalGross), PAGE_W - MARGIN - 4, y + 10.5, { align: 'right' });

        doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...MUTED);
        const dateStr = new Date().toLocaleDateString('nl-NL');
        doc.text(`Loonstrook gegenereerd op ${dateStr}`, MARGIN, PAGE_H - 12);
        doc.text('Bruto bedragen — eventuele inhoudingen niet meegenomen', PAGE_W - MARGIN, PAGE_H - 12, { align: 'right' });

        return doc;
      }

      function getPdfFilename(agent) {
        const monthLabel = fmtMonth(currentMonth); // e.g. "mei 2026"
        const display = (agent.nickname || agent.name || 'Medewerker').trim();
        const sanitized = display.replace(/[\/\\:*?"<>|]/g, '').trim();
        return `${sanitized} loon ${monthLabel}.pdf`;
      }

      function generatePDF(agent) {
        const doc = buildPdfDoc(agent);
        if (!doc) return;
        doc.save(getPdfFilename(agent));
      }

      async function generateAllPDFs() {
        if (!window.jspdf) { notify('PDF library nog aan het laden...', 'error'); return; }
        if (!window.JSZip) { notify('ZIP library nog aan het laden, probeer over een paar seconden...', 'error'); return; }
        if (agents.length === 0) return;
        setGenerating(true);
        try {
          const zip = new window.JSZip();
          for (const agent of agents) {
            const doc = buildPdfDoc(agent);
            if (!doc) continue;
            const blob = doc.output('blob');
            zip.file(getPdfFilename(agent), blob);
          }
          const zipBlob = await zip.generateAsync({ type: 'blob' });
          const url = URL.createObjectURL(zipBlob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `Loonstroken ${fmtMonth(currentMonth)}.zip`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          notify(`${agents.length} loonstroken in één ZIP gedownload`);
        } catch (e) {
          notify('Fout bij ZIP maken: ' + e.message, 'error');
        } finally {
          setGenerating(false);
        }
      }

      function generatePayoutSheet() {
        if (!window.XLSX) { notify('Excel library nog aan het laden, probeer over een paar seconden...', 'error'); return; }
        if (agents.length === 0) { notify('Geen medewerkers om te exporteren', 'error'); return; }
        const XLSX = window.XLSX;

        const headers = [
          'REKENINGNAAM', 'Rekeningnummer', 'Swiftcode', 'R.Soort',
          'Loon (€)', 'NAAM', 'HOE',
          'Uitbetaald door', 'Pot', 'Koers (€1=SRD)', 'Bedrag uitbetaald', 'Datum', 'Voldaan'
        ];
        const rows = [headers];
        const payouts = (payoutData && payoutData.payouts) || {};
        let totalEur = 0;
        let totalSrd = 0;
        for (const a of agents) {
          const calc = computeAgentPayroll(a);
          totalEur += calc.totalGross;
          const p = payouts[a.id] || {};
          const potKey = p.paidBy || null;
          const meta = potKey ? POT_META[potKey] : null;
          const actualMethod = meta ? meta.method : (a.payoutMethod || '');
          const holder = meta ? meta.holder : '';
          const potCurrency = meta ? meta.currency : '';
          const rate = (meta && meta.currency === 'SRD') ? (Number(p.exchangeRate) || 0) : null;
          const debited = potKey ? potDebit(calc.totalGross, potKey, p.exchangeRate) : 0;
          if (potCurrency === 'SRD') totalSrd += debited;
          rows.push([
            a.name || '',
            a.bankAccount || '',
            a.swiftCode || '',
            a.accountCurrency || 'EUR',
            Number(calc.totalGross.toFixed(2)),
            a.nickname || '',
            actualMethod === 'cash' ? 'Cash' : (actualMethod === 'rekening' ? 'Rekening' : ''),
            holder,
            potKey ? POT_LABELS[potKey] : '',
            rate !== null && rate > 0 ? rate : '',
            potKey ? Number(debited.toFixed(2)) : '',
            p.paidAt || '',
            p.paid ? 'Ja' : (potKey ? 'Nee' : '')
          ]);
        }
        rows.push([
          'TOTAAL', '', '', '',
          Number(totalEur.toFixed(2)), '', '',
          '', '', '',
          totalSrd > 0 ? 'SRD ' + totalSrd.toFixed(2) : '',
          '', ''
        ]);

        const ws = XLSX.utils.aoa_to_sheet(rows);

        ws['!cols'] = [
          { wch: 28 }, { wch: 18 }, { wch: 14 }, { wch: 8 },
          { wch: 12 }, { wch: 14 }, { wch: 10 },
          { wch: 14 }, { wch: 22 }, { wch: 14 }, { wch: 18 }, { wch: 12 }, { wch: 9 }
        ];

        const range = XLSX.utils.decode_range(ws['!ref']);
        const totalRowIdx = rows.length - 1;
        for (let R = range.s.r; R <= range.e.r; R++) {
          for (let C = range.s.c; C <= range.e.c; C++) {
            const addr = XLSX.utils.encode_cell({ r: R, c: C });
            const cell = ws[addr];
            if (!cell) continue;
            if (!cell.s) cell.s = {};
            // EUR loon column (E, idx 4)
            if (C === 4 && R > 0 && R < totalRowIdx) {
              cell.t = 'n';
              cell.z = '"€" #,##0.00';
            }
            // Bedrag uitbetaald column (K, idx 10) — show pot currency depending on row
            if (C === 10 && R > 0 && R < totalRowIdx && typeof cell.v === 'number') {
              cell.t = 'n';
              // Determine if SRD by checking the koers cell of same row
              const rateCell = ws[XLSX.utils.encode_cell({ r: R, c: 9 })];
              cell.z = (rateCell && rateCell.v) ? '"SRD " #,##0.00' : '"€" #,##0.00';
            }
            // Header bold
            if (R === 0) {
              cell.s.font = { bold: true };
            }
            // TOTAAL row bold
            if (R === totalRowIdx) {
              cell.s.font = { bold: true, sz: 12 };
              if (C === 4) {
                cell.t = 'n';
                cell.z = '"€" #,##0.00';
              }
            }
          }
        }

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, fmtMonth(currentMonth) || 'Uitbetaling');
        const fname = `Uitbetaling_${currentMonth}.xlsx`;
        XLSX.writeFile(wb, fname);
        notify(`Excel-bestand gedownload: ${fname}`);
      }

      /* ---------- Match summary & unmatched names ---------- */
      const csvMatchSummary = useMemo(() => {
        const known = new Set();
        agents.forEach(a => agentMatchKeys(a).forEach(k => known.add(k)));
        const unique = new Map();
        timeEntries.forEach(e => {
          if (!unique.has(e.agentKey)) unique.set(e.agentKey, { name: e.agentDisplayName || e.agentKey, matched: known.has(e.agentKey) });
        });
        const all = Array.from(unique.entries()).map(([key, v]) => ({ key, name: v.name, matched: v.matched }));
        return {
          totalCsvAgents: all.length,
          matchedCount: all.filter(x => x.matched).length,
          unmatched: all.filter(x => !x.matched)
        };
      }, [timeEntries, agents]);
      const unmatchedCsvNames = csvMatchSummary.unmatched;

      function addAgentFromCsv(displayName) {
        setAgents(a => [...a, { id: genId(), name: displayName, nickname: displayName, hourlyWage: 0, bankAccount: '', swiftCode: '', accountCurrency: 'EUR', payoutMethod: 'rekening', fixedAllowances: [] }]);
        notify(`${displayName} toegevoegd — pas naam/uurloon aan in Instellingen`);
      }

      function linkCsvNameToAgent(csvName, agentId) {
        const agent = agents.find(a => a.id === agentId);
        if (!agent) return;
        setAgents(a => a.map(x => x.id === agentId ? { ...x, nickname: csvName } : x));
        notify(`${csvName} gekoppeld aan ${agent.name || agent.nickname || 'medewerker'}`);
      }

      /* ---------- Render ---------- */
      if (loading) {
        return (
          <div style={baseStyle} className="min-h-screen flex items-center justify-center bg-stone-100">
            <div className="text-stone-500">Laden...</div>
          </div>
        );
      }

      return (
        <div style={baseStyle} className="min-h-screen bg-stone-100">
          <style>{globalCss}</style>

          {notification && (
            <div className={`fixed top-4 right-4 z-50 px-4 py-3 rounded-lg shadow-lg text-sm font-medium flex items-center gap-2 ${
              notification.kind === 'error' ? 'bg-rose-600 text-white' : 'bg-emerald-700 text-white'
            }`}>
              {notification.kind === 'error' ? <AlertCircle size={16} /> : <CheckCircle2 size={16} />}
              {notification.msg}
            </div>
          )}

          <header className="bg-white border-b border-stone-200">
            <div className="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                {company.logo ? (
                  <img src={company.logo} alt="logo" className="w-10 h-10 object-contain rounded" />
                ) : (
                  <div className="w-10 h-10 rounded bg-emerald-900 text-white flex items-center justify-center">
                    <Building2 size={20} />
                  </div>
                )}
                <div>
                  <div style={displayFont} className="text-2xl leading-none text-stone-900">
                    {company.name || 'Loondashboard'}
                  </div>
                  <div className="text-xs text-stone-500 mt-0.5 tracking-wide uppercase">Personeelsadministratie</div>
                </div>
              </div>
              <div className="text-right">
                <div className="text-xs text-stone-500 tracking-wide uppercase">Periode</div>
                <input
                  type="month"
                  value={currentMonth}
                  onChange={(e) => setCurrentMonth(e.target.value)}
                  className="bg-transparent text-stone-900 font-semibold border-none outline-none text-right"
                />
              </div>
            </div>

            <div className="max-w-6xl mx-auto px-6">
              <div className="flex gap-1 overflow-x-auto">
                <TabBtn active={activeTab === 'setup'} onClick={() => setActiveTab('setup')} icon={<Settings size={15} />}>Instellingen</TabBtn>
                <TabBtn active={activeTab === 'month'} onClick={() => setActiveTab('month')} icon={<Calendar size={15} />}>Loonperiode</TabBtn>
                <TabBtn active={activeTab === 'payslips'} onClick={() => setActiveTab('payslips')} icon={<FileText size={15} />}>Loonstroken</TabBtn>
                <TabBtn active={activeTab === 'payouts'} onClick={() => setActiveTab('payouts')} icon={<Wallet size={15} />}>Uitbetalingen</TabBtn>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-8">
            {activeTab === 'setup' && (
              <SetupTab
                company={company} setCompany={setCompany} handleLogoUpload={handleLogoUpload}
                agents={agents} addAgent={addAgent} updateAgent={updateAgent} removeAgent={removeAgent}
                addFixedAllowance={addFixedAllowance} updateFixedAllowance={updateFixedAllowance} removeFixedAllowance={removeFixedAllowance}
                projects={projects} addProject={addProject} updateProject={updateProject} removeProject={removeProject}
                addTier={addTier} updateTier={updateTier} removeTier={removeTier}
                hourBonusTiers={hourBonusTiers} addHourBonusTier={addHourBonusTier}
                updateHourBonusTier={updateHourBonusTier} removeHourBonusTier={removeHourBonusTier}
                toiletAllowanceHours={toiletAllowanceHours} setToiletAllowanceHours={setToiletAllowanceHours}
              />
            )}
            {activeTab === 'month' && (
              <MonthTab
                currentMonth={currentMonth}
                timeEntries={timeEntries} handleCsvUpload={handleCsvUpload} clearTimeEntries={clearTimeEntries}
                addTimeEntry={addTimeEntry} updateTimeEntry={updateTimeEntry} removeTimeEntry={removeTimeEntry}
                unmatchedCsvNames={unmatchedCsvNames} addAgentFromCsv={addAgentFromCsv}
                linkCsvNameToAgent={linkCsvNameToAgent}
                csvMatchSummary={csvMatchSummary}
                holidays={holidays} addHoliday={addHoliday} updateHoliday={updateHoliday} removeHoliday={removeHoliday}
                agents={agents} projects={projects}
                getAgentMD={getAgentMD}
                setIncentiveHours={setIncentiveHours} setSales={setSales}
                addManualBonus={addManualBonus} updateManualBonus={updateManualBonus} removeManualBonus={removeManualBonus}
                addSystemOutage={addSystemOutage} updateSystemOutage={updateSystemOutage} removeSystemOutage={removeSystemOutage}
              />
            )}
            {activeTab === 'payslips' && (
              <PayslipsTab
                agents={agents} computeAgentPayroll={computeAgentPayroll}
                generatePDF={generatePDF} generateAllPDFs={generateAllPDFs}
                generatePayoutSheet={generatePayoutSheet}
                jsPdfLoaded={jsPdfLoaded} generating={generating}
                currentMonth={currentMonth}
              />
            )}
            {activeTab === 'payouts' && (
              <PayoutsTab
                agents={agents}
                computeAgentPayroll={computeAgentPayroll}
                payoutData={payoutData}
                updateFund={updateFund}
                updateSaldoRate={updateSaldoRate}
                updatePayoutField={updatePayoutField}
                autoAssignPayouts={autoAssignPayouts}
                clearPayoutAssignments={clearPayoutAssignments}
                currentMonth={currentMonth}
              />
            )}
          </main>

          <footer className="max-w-6xl mx-auto px-6 py-6 text-center text-xs text-stone-400">
            Wijzigingen worden automatisch opgeslagen
          </footer>
        </div>
      );
    }

    /* ------------------------- Tabs ------------------------- */
    function TabBtn({ active, onClick, icon, children }) {
      return (
        <button onClick={onClick}
          className={`px-5 py-3 text-sm font-medium flex items-center gap-2 border-b-2 transition-colors whitespace-nowrap ${
            active ? 'text-emerald-900 border-emerald-900' : 'text-stone-500 border-transparent hover:text-stone-800'
          }`}
        >{icon}{children}</button>
      );
    }

    /* ------------------------- Setup Tab ------------------------- */
    function SetupTab({ company, setCompany, handleLogoUpload, agents, addAgent, updateAgent, removeAgent,
      addFixedAllowance, updateFixedAllowance, removeFixedAllowance,
      projects, addProject, updateProject, removeProject, addTier, updateTier, removeTier,
      hourBonusTiers, addHourBonusTier, updateHourBonusTier, removeHourBonusTier,
      toiletAllowanceHours, setToiletAllowanceHours }) {

      const [agentSearch, setAgentSearch] = useState('');
      const filteredAgents = useMemo(
        () => agents.filter(a => agentMatchesSearch(a, agentSearch)),
        [agents, agentSearch]
      );

      return (
        <div className="space-y-8">
          <Card icon={<Building2 size={18} />} title="Bedrijfsgegevens">
            <div className="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-6 items-start">
              <div>
                <Label>Bedrijfsnaam</Label>
                <Input value={company.name} onChange={(e) => setCompany(c => ({ ...c, name: e.target.value }))} placeholder="bv. Callcenter Nederland B.V." />
              </div>
              <div>
                <Label>Logo</Label>
                <div className="flex items-center gap-3">
                  {company.logo ? (
                    <img src={company.logo} alt="logo" className="w-16 h-16 object-contain border border-stone-200 rounded bg-white p-1" />
                  ) : (
                    <div className="w-16 h-16 border-2 border-dashed border-stone-300 rounded flex items-center justify-center text-stone-400">
                      <ImageIcon size={20} />
                    </div>
                  )}
                  <div className="flex flex-col gap-1">
                    <label className="cursor-pointer text-sm px-3 py-1.5 bg-stone-900 text-white rounded hover:bg-stone-800 inline-flex items-center gap-1.5">
                      <Upload size={13} /> Upload
                      <input type="file" accept="image/*" onChange={handleLogoUpload} className="hidden" />
                    </label>
                    {company.logo && (
                      <button onClick={() => setCompany(c => ({ ...c, logo: null }))} className="text-xs text-stone-500 hover:text-rose-600">Verwijderen</button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </Card>

          <Card icon={<Users size={18} />} title={`Medewerkers${agents.length > 0 ? ` (${agents.length})` : ''}`} action={<BtnPrimary onClick={addAgent}><Plus size={14} /> Toevoegen</BtnPrimary>}>
            {agents.length === 0 ? (
              <Empty>Nog geen medewerkers. Voeg ze handmatig toe of upload een CSV in de Loonperiode-tab.</Empty>
            ) : (
              <>
                {agents.length > 5 && (
                  <div className="mb-3">
                    <SearchBar value={agentSearch} onChange={setAgentSearch} placeholder="Zoek medewerker op naam of bijnaam..." />
                    {agentSearch && (
                      <div className="text-xs text-stone-500 mt-1.5">{filteredAgents.length} van {agents.length} getoond</div>
                    )}
                  </div>
                )}
                {filteredAgents.length === 0 ? (
                  <Empty>Geen medewerkers gevonden voor "{agentSearch}".</Empty>
                ) : (
                  <div className="divide-y divide-stone-100 -mx-2">
                    {filteredAgents.map(a => (
                      <AgentRow key={a.id} agent={a} updateAgent={updateAgent} removeAgent={removeAgent}
                        addFixedAllowance={addFixedAllowance} updateFixedAllowance={updateFixedAllowance} removeFixedAllowance={removeFixedAllowance} />
                    ))}
                  </div>
                )}
              </>
            )}
          </Card>

          <Card icon={<Briefcase size={18} />} title="Projecten & bonusstaffels" action={<BtnPrimary onClick={addProject}><Plus size={14} /> Project</BtnPrimary>}>
            {projects.length === 0 ? (
              <Empty>Voeg projecten toe waar agents sales op maken. Per project kun je verschillende bonus-staffels instellen.</Empty>
            ) : (
              <div className="space-y-5">
                {projects.map(p => (
                  <ProjectEditor key={p.id} project={p}
                    updateProject={updateProject} removeProject={removeProject}
                    addTier={addTier} updateTier={updateTier} removeTier={removeTier} />
                ))}
              </div>
            )}
            {projects.length > 0 && (
              <div className="mt-4 p-3 bg-stone-50 border border-stone-200 rounded text-xs text-stone-600">
                <strong>Hoe werkt een staffel?</strong> Bij <em>50–75 sales</em> met basis €25 en €0,25 per sale: 60 sales = €25 + (60−50) × €0,25 = <strong>€27,50</strong>. Onder de minimum-sales geen bonus. Boven de hoogste max wordt de hoogste staffel toegepast (gecapped op die max).
              </div>
            )}
          </Card>

          <Card icon={<Clock size={18} />} title="Uren-bonus" action={<BtnPrimary onClick={addHourBonusTier}><Plus size={14} /> Drempel</BtnPrimary>}>
            <div className="text-xs text-stone-500 mb-3">
              Bonus op basis van totaal uren in de maand. Telt mee: werkuren + incentive uren + systeemstoringen. De hoogste drempel die de agent haalt wordt toegepast.
            </div>
            {hourBonusTiers.length === 0 ? (
              <Empty>Nog geen drempels ingesteld.</Empty>
            ) : (
              <div className="space-y-1.5">
                <div className="grid grid-cols-[120px_120px_40px] gap-2 pb-1 text-xs text-stone-500 uppercase tracking-wider font-medium">
                  <div>Vanaf uren</div>
                  <div>Bedrag €</div>
                  <div></div>

                  <div key={t.id} className="grid grid-cols-[120px_120px_40px] gap-2 items-center">
                    <Input type="number" value={t.minHours} onChange={(e) => updateHourBonusTier(t.id, 'minHours', parseFloat(e.target.value) || 0)} />
                    <div className="relative">
                      <span className="absolute left-2 top-1/2 -translate-y-1/2 text-stone-400 text-xs">€</span>
                      <Input type="number" step="0.01" value={t.amount} onChange={(e) => updateHourBonusTier(t.id, 'amount', parseFloat(e.target.value) || 0)} className="pl-6" />
                    </div>
                    <button onClick={() => removeHourBonusTier(t.id)} className="text-stone-400 hover:text-rose-600 p-1"><X size={14} /></button>
                  </div>
                ))}
              </div>
            )}
          </Card>

          <Card icon={<Sparkles size={18} />} title="Toiletvergoeding">
            <div className="text-xs text-stone-500 mb-3">
              Iedere medewerker krijgt automatisch dit aantal uren × eigen uurloon erbij. Op 0 zetten om uit te schakelen.
            </div>
            <div className="grid grid-cols-[1fr_140px] gap-3 items-center max-w-md">
              <div className="text-sm text-stone-700">Aantal uren per medewerker</div>
              <Input type="number" step="0.5" value={toiletAllowanceHours}
                onChange={(e) => setToiletAllowanceHours(parseFloat(e.target.value) || 0)} />
            </div>
          </Card>
        </div>
      );
    }

    function AgentRow({ agent, updateAgent, removeAgent, addFixedAllowance, updateFixedAllowance, removeFixedAllowance }) {
      const [open, setOpen] = useState(false);
      const allowances = agent.fixedAllowances || [];
      const allowanceTotal = allowances.reduce((s, a) => s + (Number(a.amount) || 0), 0);
      return (
        <div>
          <div className="flex items-center gap-2 py-2 px-2">
            <button onClick={() => setOpen(o => !o)} className="text-stone-400 hover:text-stone-700 flex-shrink-0">
              {open ? <ChevronUp size={16} /> : <ChevronDown size={16} />}
            </button>
            <Input value={agent.name} onChange={(e) => updateAgent(agent.id, 'name', e.target.value)} placeholder="Volledige naam" className="flex-1 min-w-0" />
            <div className="relative w-[120px] flex-shrink-0">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-sm">€</span>
              <Input type="number" step="0.01" value={agent.hourlyWage} onChange={(e) => updateAgent(agent.id, 'hourlyWage', parseFloat(e.target.value) || 0)} className="pl-7" placeholder="0,00" />
            </div>
            <button onClick={() => removeAgent(agent.id)} className="text-stone-400 hover:text-rose-600 p-2 flex-shrink-0"><Trash2 size={15} /></button>
          </div>
          {open && (

                                    <div>Uren</div>
                                    <div></div>
                                  </div>

                                      <Input type="number" step="0.25" value={o.hours} onChange={(e) => updateSystemOutage(a.id, o.id, 'hours', parseFloat(e.target.value) || 0)} placeholder="0" />

                                    <div>Omschrijving</div>
                                    <div>Sales</div>
                                    <div>Bedrag</div>
                                    <div></div>

                                  {md.manualBonuses.map(b => (

    /* ------------------------- Add time entry form ------------------------- */
    function UnmatchedRow({ csvName, agents, onLink, onAddNew }) {
      const [selectValue, setSelectValue] = useState('');
      const sortedAgents = useMemo(
        () => [...agents].filter(a => a.name?.trim() || a.nickname?.trim())
          .sort((a, b) => (a.name || a.nickname || '').localeCompare(b.name || b.nickname || '')),
        [agents]
      );

      function handleSelect(e) {
        const id = e.target.value;
        if (!id) return;
        onLink(id);
        setSelectValue('');
      }

      return (
        <div className="flex items-center gap-2 flex-wrap bg-white border border-amber-200 rounded px-2 py-1.5">
          <div className="text-sm font-medium text-stone-900 flex-1 min-w-[120px]">{csvName}</div>
          <select value={selectValue} onChange={handleSelect}
            className="text-xs px-2 py-1 border border-stone-300 rounded bg-white text-stone-700 outline-none focus:border-emerald-700 max-w-[200px]">
            <option value="">→ Koppel aan…</option>
            {sortedAgents.map(a => (
              <option key={a.id} value={a.id}>{a.name || a.nickname}{a.nickname && a.name && a.name !== a.nickname ? ` (${a.nickname})` : ''}</option>
            ))}
          </select>
          <button onClick={onAddNew} className="text-xs px-2 py-1 bg-amber-100 hover:bg-amber-200 border border-amber-300 rounded text-amber-900 whitespace-nowrap">
            + Nieuwe medewerker
          </button>
        </div>
      );
    }

    function AddTimeEntryForm({ agents, projects, onAdd, onCancel }) {
      const validAgents = agents.filter(a => a.name.trim());
      const [agentId, setAgentId] = useState(validAgents[0]?.id || '');
      const [projectName, setProjectName] = useState('');
      const [sales, setSales] = useState(0);
      const [secs, setSecs] = useState({ begeleiding: 0, nawerktijd: 0, inGesprek: 0, uitbellend: 0, beschikbaar: 0 });

      function submit() {
        const a = validAgents.find(x => x.id === agentId);
        if (!a) { alert('Selecteer een medewerker'); return; }
        const matchKey = (a.nickname || a.name || '').trim().toLowerCase();
        const displayName = a.nickname || a.name;
        onAdd({
          agentKey: matchKey,
          agentDisplayName: displayName,
          projectName: projectName.trim(),
          sales: Number(sales) || 0,
          begeleiding: secs.begeleiding,
          nawerktijd: secs.nawerktijd,
          inGesprek: secs.inGesprek,
          uitbellend: secs.uitbellend,
          beschikbaar: secs.beschikbaar

      if (validAgents.length === 0) {
        return (
          <div className="border border-amber-200 bg-amber-50 rounded-lg p-4 mb-3 text-sm text-amber-900">

            <button onClick={onCancel} className="ml-3 text-amber-700 underline">Sluiten</button>

      return (
        <div className="border-2 border-emerald-200 bg-emerald-50/30 rounded-lg p-4 mb-4">

            </div>
            <div>
              <Label>Project</Label>
              <ProjectSelect value={projectName} onChange={setProjectName} projects={projects} />
              {projects.length === 0 && (
                <div className="text-xs text-amber-700 mt-1">Voeg projecten toe in Instellingen om uit te kunnen kiezen.</div>
              )}
            </div>
            <div>
              <Label>Sales</Label>
              <Input type="number" value={sales || ''} onChange={(e) => setSales(parseFloat(e.target.value) || 0)} placeholder="0" />
            </div>
          </div>
          <Label>Uren (HH:MM, HH:MM:SS of decimaal zoals 5,5)</Label>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-2 mb-4 mt-1.5">
            {TIME_FIELDS.map(([k, label]) => (
              <div key={k}>
                <div className="text-xs text-stone-500 mb-1">{label}</div>
                <TimeInput value={secs[k]} onChange={(v) => setSecs(s => ({ ...s, [k]: v }))} />
              </div>
            ))}
          </div>
          <div className="flex gap-2 justify-end">
            <button onClick={onCancel} className="px-3 py-1.5 text-sm text-stone-600 hover:text-stone-900">Annuleren</button>
            <BtnPrimary onClick={submit}><Plus size={14} /> Toevoegen</BtnPrimary>
          </div>
        </div>
      );
    }

    /* ------------------------- Time entries list ------------------------- */
    function TimeEntriesList({ entries, agents, projects, onUpdate, onRemove }) {
      const [search, setSearch] = useState('');
      const groups = useMemo(() => {
        const g = {};
        entries.forEach(e => {
          if (!g[e.agentKey]) g[e.agentKey] = { displayName: e.agentDisplayName || e.agentKey, entries: [] };
          g[e.agentKey].entries.push(e);
        });
        return Object.entries(g).sort((a, b) => a[1].displayName.localeCompare(b[1].displayName));
      }, [entries]);

      const filteredGroups = useMemo(
        () => groups.filter(([key, g]) => matchesSearch(g.displayName, search) || matchesSearch(key, search)),
        [groups, search]
      );

      const knownAgentKeys = useMemo(() => {
        const s = new Set();
        agents.forEach(a => agentMatchKeys(a).forEach(k => s.add(k)));
        return s;
      }, [agents]);

      return (
        <div className="space-y-3">
          {groups.length > 5 && (
            <div>
              <SearchBar value={search} onChange={setSearch} placeholder="Zoek op agent-naam..." />
              {search && (
                <div className="text-xs text-stone-500 mt-1.5">{filteredGroups.length} van {groups.length} agents getoond</div>
              )}
            </div>
          )}
          {filteredGroups.map(([key, group]) => {
            const totalSecs = group.entries.reduce((s, e) => s + entryTotalSecs(e), 0);
            const isUnmatched = !knownAgentKeys.has(key);
            return (
              <div key={key} className="border border-stone-200 rounded-lg overflow-hidden">
                <div className="flex items-center justify-between px-3 py-2 bg-stone-50 border-b border-stone-200 flex-wrap gap-2">
                  <div className="flex items-center gap-2 min-w-0">
                    <div className="font-medium text-stone-900 truncate">{group.displayName}</div>
                    {isUnmatched && <span className="text-xs px-1.5 py-0.5 bg-amber-100 text-amber-800 rounded whitespace-nowrap">niet in systeem</span>}
                  </div>
                  <div className="text-xs text-stone-500 whitespace-nowrap">{fmtHours(secsToHours(totalSecs))} uur · {group.entries.length} regel(s)</div>
                </div>
                <div className="divide-y divide-stone-100">
                  {group.entries.map(e => (
                    <TimeEntryRow key={e.id} entry={e} projects={projects} onUpdate={onUpdate} onRemove={onRemove} />
                  ))}
                </div>
              </div>
            );
          })}
          {filteredGroups.length === 0 && search && (
            <Empty>Geen agents gevonden voor "{search}".</Empty>
          )}
        </div>
      );
    }

              <div className="truncate text-sm text-stone-700">
                {entry.projectName || <em className="text-stone-400">geen project</em>}

            <div className="flex items-center gap-3 whitespace-nowrap">
              {entry.sales > 0 && (
