    function PayoutsTab({ agents, computeAgentPayroll, payoutData, updateFund, updateSaldoRate, updatePayoutField, autoAssignPayouts, clearPayoutAssignments, currentMonth }) {
      const funds = payoutData.funds || emptyFunds();
      const payouts = payoutData.payouts || {};
      const saldoRate = Number(payoutData.saldoRate) || 0;
      const srdToEur = (srd) => saldoRate > 0 ? srd / saldoRate : 0;

      const [sortBy, setSortBy] = useState('name');
      const [sortDir, setSortDir] = useState('asc');
      function toggleSort(col) {
        if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortBy(col); setSortDir('asc'); }
      }

      const wages = useMemo(() => {
        return agents.map(a => {
          const calc = computeAgentPayroll(a);
          return {
            agent: a,
            amount: calc.totalGross,
            method: a.payoutMethod || 'rekening',
            accountCurrency: a.accountCurrency || 'EUR',
            eligible: eligiblePotsFor(a),
          };
        }).filter(w => w.amount > 0);
      }, [agents, computeAgentPayroll]);

      const totalEurWages = useMemo(() => wages.reduce((s, w) => s + w.amount, 0), [wages]);

      const usedByPot = useMemo(() => {
        const u = POT_KEYS.reduce((o, k) => { o[k] = 0; return o; }, {});
        wages.forEach(w => {
          const p = payouts[w.agent.id];
          if (p && p.paidBy && u[p.paidBy] !== undefined) {
            u[p.paidBy] += potDebit(w.amount, p.paidBy, p.exchangeRate);
          }
        });
        return u;
      }, [wages, payouts]);

      const remaining = POT_KEYS.reduce((o, k) => { o[k] = (Number(funds[k]) || 0) - usedByPot[k]; return o; }, {});

      const totalAvailableEur = (funds.shenifaCashEur || 0) + (funds.shenifaBankEur || 0) + (funds.anouskaBankEur || 0);
      const totalAvailableSrd = (funds.shenifaCashSrd || 0) + (funds.shenifaBankSrd || 0);
      const totalShenifaEur = (funds.shenifaCashEur || 0) + (funds.shenifaBankEur || 0);
      const totalAnouskaEur = (funds.anouskaBankEur || 0);
      const totalShenifaSrd = (funds.shenifaCashSrd || 0) + (funds.shenifaBankSrd || 0);
      const totalRemainingEur = remaining.shenifaCashEur + remaining.shenifaBankEur + remaining.anouskaBankEur;
      const totalRemainingSrd = remaining.shenifaCashSrd + remaining.shenifaBankSrd;

      const cashOverEur = remaining.shenifaCashEur > 0;
      const cashOverSrd = remaining.shenifaCashSrd > 0;
      const negativePots = POT_KEYS.filter(k => remaining[k] < -0.001);

      const eurPots = ['shenifaCashEur', 'shenifaBankEur', 'anouskaBankEur'];
      const srdPots = ['shenifaCashSrd', 'shenifaBankSrd'];

      const sortedWages = useMemo(() => {
        const arr = wages.slice();
        const dir = sortDir === 'asc' ? 1 : -1;
        arr.sort((a, b) => {
          let av, bv;
          if (sortBy === 'name') {
            av = (a.agent.name || a.agent.nickname || '').toLowerCase();
            bv = (b.agent.name || b.agent.nickname || '').toLowerCase();
            return av < bv ? -1 * dir : av > bv ? 1 * dir : 0;
          }
          if (sortBy === 'amount') {
            return (a.amount - b.amount) * dir;
          }
          if (sortBy === 'paidBy') {
            av = POT_LABELS[payouts[a.agent.id]?.paidBy] || '';
            bv = POT_LABELS[payouts[b.agent.id]?.paidBy] || '';
            return av < bv ? -1 * dir : av > bv ? 1 * dir : 0;
          }
          if (sortBy === 'paid') {
            av = payouts[a.agent.id]?.paid ? 1 : 0;
            bv = payouts[b.agent.id]?.paid ? 1 : 0;
            return (av - bv) * dir;
          }
          return 0;
        });
        return arr;
      }, [wages, sortBy, sortDir, payouts]);

      function SortHeader({ col, children, align = 'left' }) {
        const active = sortBy === col;
        const arrow = active ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';
        return (
          <th className={`text-${align} py-2 px-2 cursor-pointer select-none hover:text-stone-700 ${active ? 'text-emerald-800' : ''}`}
            onClick={() => toggleSort(col)}>
            {children}{arrow}
          </th>
        );
      }

      return (
        <div className="space-y-6">
          <div className="flex items-baseline justify-between flex-wrap gap-3">
            <div>
              <div style={displayFont} className="text-3xl text-stone-900">Uitbetalingen</div>
              <div className="text-sm text-stone-500 mt-1">{fmtMonth(currentMonth)} · {wages.length} medewerker(s) te betalen</div>
            </div>
            <div className="flex flex-wrap gap-2">
              <button onClick={clearPayoutAssignments}
                className="px-4 py-2 bg-white border border-stone-200 text-stone-700 rounded hover:bg-stone-50 inline-flex items-center gap-2 text-sm font-medium">
                <Trash2 size={14} /> Toewijzingen wissen
              </button>
              <button onClick={() => autoAssignPayouts(agents, computeAgentPayroll)} disabled={wages.length === 0}
                className="px-4 py-2 bg-emerald-900 text-white rounded hover:bg-emerald-800 inline-flex items-center gap-2 text-sm font-medium disabled:opacity-50">
                <Wand size={14} /> Cash opmaken & automatisch toewijzen
              </button>
            </div>
          </div>

          {/* Beschikbaar */}
          <Card icon={<Wallet size={18} />} title="Beschikbaar geld deze maand">
            <div className="text-xs text-stone-500 mb-4">Vul in hoeveel geld er aan het begin van deze maand bij elke persoon ligt. Het overschot van vorige maand wordt automatisch overgenomen.</div>

            {/* Saldo-koers */}
            <div className="flex items-center gap-3 p-3 mb-4 bg-amber-50 border border-amber-200 rounded">
              <Label>Saldo-koers €1 =</Label>
              <div className="relative w-32">
                <Input type="number" step="0.01" value={saldoRate || 0}
                  onChange={(e) => updateSaldoRate(parseFloat(e.target.value) || 0)}
                  className="pr-10" placeholder="bv. 38" />
                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-stone-500 text-xs">SRD</span>
              </div>
              <div className="text-xs text-stone-600">Wordt gebruikt om SRD-bedragen onder de inputs te tonen in €. Niet hetzelfde als de koers per uitbetaling.</div>
            </div>

            {/* Totalen bovenin */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
              <div className="p-3 rounded bg-emerald-50 border border-emerald-200">
                <div className="text-[10px] text-emerald-900 font-medium uppercase tracking-wider">Totaal beschikbaar (€)</div>
                <div className="text-xl font-semibold tabular-nums text-emerald-900 mt-0.5">{fmtEuro(totalAvailableEur)}</div>
                {saldoRate > 0 && totalAvailableSrd > 0 && (
                  <div className="text-[10px] text-emerald-700 mt-1">Incl. SRD: {fmtEuro(totalAvailableEur + srdToEur(totalAvailableSrd))}</div>
                )}
                <div className="text-[10px] text-emerald-700 mt-0.5">Lonen: {fmtEuro(totalEurWages)}</div>
              </div>
              <div className="p-3 rounded bg-stone-50 border border-stone-200">
                <div className="text-[10px] text-stone-500 font-medium uppercase tracking-wider">Shenifa totaal (€)</div>
                <div className="text-xl font-semibold tabular-nums text-stone-900 mt-0.5">{fmtEuro(totalShenifaEur)}</div>
                <div className="text-[10px] text-stone-500 mt-1">cash + rekening</div>
              </div>
              <div className="p-3 rounded bg-stone-50 border border-stone-200">
                <div className="text-[10px] text-stone-500 font-medium uppercase tracking-wider">Anouska totaal (€)</div>
                <div className="text-xl font-semibold tabular-nums text-stone-900 mt-0.5">{fmtEuro(totalAnouskaEur)}</div>
                <div className="text-[10px] text-stone-500 mt-1">rekening</div>
              </div>
              <div className="p-3 rounded bg-stone-50 border border-stone-200">
                <div className="text-[10px] text-stone-500 font-medium uppercase tracking-wider">Shenifa SRD</div>
                <div className="text-xl font-semibold tabular-nums text-stone-900 mt-0.5">{fmtSrd(totalShenifaSrd)}</div>
                {saldoRate > 0 && (
                  <div className="text-[10px] text-stone-500 mt-1">≈ {fmtEuro(srdToEur(totalShenifaSrd))}</div>
                )}
                {!(saldoRate > 0) && <div className="text-[10px] text-stone-500 mt-1">cash + rekening</div>}
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
              {eurPots.map(k => (
                <div key={k}>
                  <Label>{POT_LABELS[k]}</Label>
                  <div className="relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-sm">€</span>
                    <Input type="number" step="0.01" value={funds[k] || 0}
                      onChange={(e) => updateFund(k, parseFloat(e.target.value) || 0)}
                      className="pl-7" />
                  </div>
                </div>
              ))}
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              {srdPots.map(k => (
                <div key={k}>
                  <Label>{POT_LABELS[k]}</Label>
                  <div className="relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-[10px] font-semibold">SRD</span>
                    <Input type="number" step="0.01" value={funds[k] || 0}
                      onChange={(e) => updateFund(k, parseFloat(e.target.value) || 0)}
                      className="pl-12" />
                  </div>
                  {saldoRate > 0 && (Number(funds[k]) || 0) > 0 && (
                    <div className="text-[10px] text-stone-500 mt-1 ml-1">≈ {fmtEuro(srdToEur(Number(funds[k]) || 0))}</div>
                  )}
                </div>
              ))}
              <div className="hidden md:block"></div>
            </div>
          </Card>

          {/* Lonen lijst */}
          <Card icon={<Users size={18} />} title="Uitbetalen aan medewerkers">
            {wages.length === 0 ? (
              <Empty>Nog geen lonen voor deze maand. Vul eerst uren of bonussen in onder Loonperiode.</Empty>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="text-[10px] text-stone-500 uppercase tracking-wider font-medium border-b border-stone-200">
                      <SortHeader col="name">Medewerker</SortHeader>
                      <SortHeader col="amount" align="right">Bedrag (€)</SortHeader>
                      <th className="text-left py-2 px-2">Methode</th>
                      <SortHeader col="paidBy">Uitbetaald door</SortHeader>
                      <th className="text-left py-2 px-2">Datum</th>
                      <SortHeader col="paid" align="center">Voldaan</SortHeader>
                    </tr>
                  </thead>
                  <tbody>
                    {sortedWages.map(w => {
                      const p = payouts[w.agent.id] || {};
                      const isSrdPot = p.paidBy && POT_META[p.paidBy]?.currency === 'SRD';
                      const rate = Number(p.exchangeRate) || 0;
                      const srdAmount = isSrdPot ? w.amount * rate : 0;
                      return (
                        <tr key={w.agent.id} className="border-b border-stone-100 align-middle">
                          <td className="py-2 px-2">
                            <div className="font-medium text-stone-900">{w.agent.name || <span className="text-stone-400">Naamloos</span>}</div>
                            {w.agent.nickname && <div className="text-xs text-stone-500">{w.agent.nickname}</div>}
                          </td>
                          <td className="py-2 px-2 text-right tabular-nums font-medium">{fmtEuro(w.amount)}</td>
                          <td className="py-2 px-2 text-stone-600">
                            {(() => {
                              const actualMethod = p.paidBy ? POT_META[p.paidBy].method : w.method;
                              const overridden = p.paidBy && actualMethod !== w.method;
                              return (
                                <span className="inline-flex items-center gap-1 text-xs">
                                  {actualMethod === 'cash' ? 'Cash' : 'Rekening'}
                                  {overridden && <span className="px-1 py-0.5 bg-blue-100 text-blue-800 text-[9px] rounded font-medium" title={`Standaard: ${w.method}`}>aangepast</span>}
                                  {w.accountCurrency === 'SRD' && <span className="px-1 py-0.5 bg-amber-100 text-amber-800 text-[9px] rounded font-medium">SRD-rek.</span>}
                                </span>
                              );
                            })()}
                          </td>
                          <td className="py-2 px-2">
                            <select value={p.paidBy || ''}
                              onChange={(e) => updatePayoutField(w.agent.id, 'paidBy', e.target.value || null)}
                              className="px-2 py-1.5 text-sm border border-stone-200 rounded bg-white outline-none focus:border-emerald-700 min-w-[180px]">
                              <option value="">— kies —</option>
                              {w.eligible.map(k => <option key={k} value={k}>{POT_LABELS[k]}</option>)}
                              {p.paidBy && !w.eligible.includes(p.paidBy) && (
                                <option value={p.paidBy}>{POT_LABELS[p.paidBy]} (verlopen)</option>
                              )}
                            </select>
                            {isSrdPot && (
                              <div className="mt-1.5 flex items-center gap-1.5">
                                <span className="text-[10px] text-stone-500 whitespace-nowrap">Koers €1 =</span>
                                <input type="number" step="0.01" value={p.exchangeRate || ''}
                                  onChange={(e) => updatePayoutField(w.agent.id, 'exchangeRate', parseFloat(e.target.value) || 0)}
                                  placeholder="bv. 38"
                                  className="w-20 px-2 py-1 text-xs border border-amber-300 rounded bg-amber-50 outline-none focus:border-amber-600" />
                                <span className="text-[10px] text-stone-500">SRD</span>
                                {rate > 0 && (
                                  <span className="text-[11px] text-emerald-800 font-medium ml-1">= {fmtSrd(srdAmount)}</span>
                                )}
                              </div>
                            )}
                          </td>
                          <td className="py-2 px-2">
                            <input type="date" value={p.paidAt || ''}
                              onChange={(e) => updatePayoutField(w.agent.id, 'paidAt', e.target.value)}
                              className="px-2 py-1.5 text-sm border border-stone-200 rounded bg-white outline-none focus:border-emerald-700" />
                          </td>
                          <td className="py-2 px-2 text-center">
                            <input type="checkbox" checked={!!p.paid}
                              onChange={(e) => updatePayoutField(w.agent.id, 'paid', e.target.checked)}
                              className="w-4 h-4 accent-emerald-700" />
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr className="font-semibold text-stone-900">
                      <td className="py-2 px-2">Totaal lonen</td>
                      <td className="py-2 px-2 text-right tabular-nums">{fmtEuro(totalEurWages)}</td>
                      <td colSpan="4"></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            )}
          </Card>

          {/* Saldo */}
          <Card icon={<Wallet size={18} />} title="Saldo per pot">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
              {eurPots.map(k => {
                const start = Number(funds[k]) || 0;
                const used = usedByPot[k];
                const left = remaining[k];
                const negative = left < -0.001;
                return (
                  <div key={k} className={`p-3 rounded border ${negative ? 'border-rose-300 bg-rose-50' : 'border-stone-200 bg-stone-50'}`}>
                    <div className="text-xs text-stone-500 font-medium uppercase tracking-wider mb-1">{POT_LABELS[k]}</div>
                    <div className="text-lg font-semibold tabular-nums text-stone-900">{fmtEuro(left)}</div>
                    <div className="text-xs text-stone-500 mt-1">
                      Start {fmtEuro(start)} − uitbetaald {fmtEuro(used)}
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              {srdPots.map(k => {
                const start = Number(funds[k]) || 0;
                const used = usedByPot[k];
                const left = remaining[k];
                const negative = left < -0.001;
                return (
                  <div key={k} className={`p-3 rounded border ${negative ? 'border-rose-300 bg-rose-50' : 'border-stone-200 bg-stone-50'}`}>
                    <div className="text-xs text-stone-500 font-medium uppercase tracking-wider mb-1">{POT_LABELS[k]}</div>
                    <div className="text-lg font-semibold tabular-nums text-stone-900">{fmtSrd(left)}</div>
                    {saldoRate > 0 && (
                      <div className="text-[11px] text-stone-500 mt-0.5">≈ {fmtEuro(srdToEur(left))}</div>
                    )}
                    <div className="text-xs text-stone-500 mt-1">
                      Start {fmtSrd(start)} − uitbetaald {fmtSrd(used)}
                    </div>
                  </div>
                );
              })}
              <div className="hidden md:block"></div>
            </div>

            <div className="border-t border-stone-200 mt-5 pt-4 grid grid-cols-1 md:grid-cols-3 gap-3">
              <div className="p-3 rounded bg-emerald-50 border border-emerald-200">
                <div className="text-xs text-emerald-900 font-medium uppercase tracking-wider mb-1">Totaal over (€)</div>
                <div className="text-2xl font-semibold tabular-nums text-emerald-900">{fmtEuro(totalRemainingEur)}</div>
                <div className="text-xs text-emerald-700 mt-1">Van {fmtEuro(totalAvailableEur)} beschikbaar</div>
              </div>
              <div className="p-3 rounded bg-emerald-50 border border-emerald-200">
                <div className="text-xs text-emerald-900 font-medium uppercase tracking-wider mb-1">Totaal over (SRD)</div>
                <div className="text-2xl font-semibold tabular-nums text-emerald-900">{fmtSrd(totalRemainingSrd)}</div>
                {saldoRate > 0 && (
                  <div className="text-[11px] text-emerald-700 mt-0.5">≈ {fmtEuro(srdToEur(totalRemainingSrd))}</div>
                )}
                <div className="text-xs text-emerald-700 mt-1">Van {fmtSrd(totalAvailableSrd)} beschikbaar</div>
              </div>
              {saldoRate > 0 && (
                <div className="p-3 rounded bg-emerald-100 border border-emerald-300">
                  <div className="text-xs text-emerald-900 font-medium uppercase tracking-wider mb-1">Totaal over (€-equivalent)</div>
                  <div className="text-2xl font-semibold tabular-nums text-emerald-900">{fmtEuro(totalRemainingEur + srdToEur(totalRemainingSrd))}</div>
                  <div className="text-xs text-emerald-700 mt-1">€ + SRD omgerekend met saldo-koers</div>
                </div>
              )}
            </div>

            {(cashOverEur || cashOverSrd || negativePots.length > 0) && (
              <div className="mt-4 space-y-2">
                {negativePots.map(k => (
                  <div key={k} className="flex items-start gap-2 p-3 rounded bg-rose-50 border border-rose-200 text-sm">
                    <AlertTriangle size={16} className="text-rose-600 mt-0.5 flex-shrink-0" />
                    <div className="text-rose-800">
                      <strong>{POT_LABELS[k]}</strong> is overschreden met {POT_META[k].currency === 'SRD' ? fmtSrd(-remaining[k]) : fmtEuro(-remaining[k])}.
                      Verlaag een toewijzing of vul meer geld bij.
                    </div>
                  </div>
                ))}
                {cashOverEur && (
                  <div className="flex items-start gap-2 p-3 rounded bg-amber-50 border border-amber-200 text-sm">
                    <AlertTriangle size={16} className="text-amber-600 mt-0.5 flex-shrink-0" />
                    <div className="text-amber-900">
                      Er is nog <strong>{fmtEuro(remaining.shenifaCashEur)}</strong> cash (€) over bij Shenifa. Cash moet elke maand worden opgemaakt.
                    </div>
                  </div>
                )}
                {cashOverSrd && (
                  <div className="flex items-start gap-2 p-3 rounded bg-amber-50 border border-amber-200 text-sm">
                    <AlertTriangle size={16} className="text-amber-600 mt-0.5 flex-shrink-0" />
                    <div className="text-amber-900">
                      Er is nog <strong>{fmtSrd(remaining.shenifaCashSrd)}</strong> cash (SRD) over bij Shenifa.
                    </div>
                  </div>
                )}
              </div>
            )}
          </Card>
        </div>
      );
    }

    /* ------------------------- Reusable bits ------------------------- */
    function Card({ icon, title, action, children }) {
      return (
        <section className="bg-white border border-stone-200 rounded-lg p-6">
          {(title || action) && (
            <header className="flex items-center justify-between mb-5 flex-wrap gap-3">
              <div className="flex items-center gap-2 text-stone-700">
                {icon}<h2 className="font-semibold text-stone-900">{title}</h2>
              </div>
              {action}
            </header>
          )}
          {children}
        </section>
      );
    }
    function Label({ children }) {
      return <div className="text-xs text-stone-500 uppercase tracking-wider font-medium mb-1.5">{children}</div>;
    }
    function NumberInput({ value, onChange, className, onFocus, ...rest }) {
      const [str, setStr] = useState('');
      const [focused, setFocused] = useState(false);

      useEffect(() => {
        if (!focused) {
          const num = Number(value);
          if (!num || isNaN(num)) setStr('');
          else setStr(String(num).replace('.', ','));
        }
      }, [value, focused]);

      const handleChange = (e) => {
        const v = e.target.value;
        if (v !== '' && !/^-?[0-9]*[.,]?[0-9]*$/.test(v)) return;
        setStr(v);
        const cleaned = v.replace(',', '.');
        if (cleaned === '' || cleaned === '.' || cleaned === '-' || cleaned === '-.') {
          onChange?.({ target: { value: '0' } });
          return;
        }
        const num = parseFloat(cleaned);
        if (!isNaN(num)) onChange?.({ target: { value: String(num) } });
      };

      const handleFocus = (e) => {
        setFocused(true);
        e.target.select();
        if (onFocus) onFocus(e);
      };

      return (
        <input
          type="text" inputMode="decimal"
          value={str}
          onChange={handleChange}
          onFocus={handleFocus}
          onBlur={() => setFocused(false)}
          className={className}
          {...rest}
        />
      );
    }

    function Input({ className = '', onFocus, ...props }) {
      const baseClass = `w-full px-3 py-2 text-sm border border-stone-200 rounded bg-white text-stone-900 outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700/20 ${className}`;
      if (props.type === 'number') {
        const { type, step, ...rest } = props;
        return <NumberInput {...rest} onFocus={onFocus} className={baseClass} />;
      }
      return <input {...props} onFocus={onFocus} className={baseClass} />;
    }

    function TimeInput({ value, onChange, className = '', onFocus, ...rest }) {
      const [str, setStr] = useState('');
      const [focused, setFocused] = useState(false);

      useEffect(() => {
        if (!focused) setStr(formatSecs(value));
      }, [value, focused]);

      const handleChange = (e) => {
        const v = e.target.value;
        setStr(v);
        if (v.trim() === '') { onChange(0); return; }
        const secs = parseTime(v);
        onChange(secs);
      };

      const handleFocus = (e) => {
        setFocused(true);
        e.target.select();
        if (onFocus) onFocus(e);
      };

      const handleBlur = () => {
        setFocused(false);
        onChange(parseTime(str) || 0);
      };

      return (
        <input
          type="text"
          value={str}
          onChange={handleChange}
          onFocus={handleFocus}
          onBlur={handleBlur}
          placeholder="0:00:00"
          className={`w-full px-3 py-2 text-sm border border-stone-200 rounded bg-white text-stone-900 outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700/20 ${className}`}
          {...rest}
        />
      );
    }

    function ProjectSelect({ value, onChange, projects, className = '', includeNoProject = true }) {
      const projectNames = projects.filter(p => p.name && p.name.trim()).map(p => p.name.trim());
      const isCustom = value && !projectNames.includes(value);
      return (
        <select value={value || ''} onChange={(e) => onChange(e.target.value)}
          className={`w-full px-3 py-2 text-sm border border-stone-200 rounded bg-white text-stone-900 outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700/20 ${className}`}>
          {includeNoProject && <option value="">— Geen project —</option>}
          {projectNames.map(n => <option key={n} value={n}>{n}</option>)}
          {isCustom && <option value={value}>{value} (overig)</option>}
        </select>
      );
    }
    function BtnPrimary({ onClick, children }) {
      return (
        <button onClick={onClick} className="px-3 py-1.5 bg-emerald-900 text-white rounded hover:bg-emerald-800 inline-flex items-center gap-1.5 text-sm font-medium">
          {children}
        </button>
      );
    }
    function Empty({ children }) {
      return <div className="text-center py-6 text-sm text-stone-500">{children}</div>;
    }

    function SearchBar({ value, onChange, placeholder = 'Zoeken...', className = '' }) {
      return (
        <div className={`relative ${className}`}>
          <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none" />
          <input
            type="search"
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder={placeholder}
            className="w-full pl-9 pr-3 py-2 text-sm border border-stone-200 rounded bg-white text-stone-900 outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700/20"
          />
          {value && (
            <button onClick={() => onChange('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-700">
              <X size={14} />
            </button>
          )}
        </div>
      );
    }

    function matchesSearch(text, query) {
      if (!query) return true;
      return String(text || '').toLowerCase().includes(query.toLowerCase());
    }

    function agentMatchesSearch(agent, query) {
      if (!query) return true;
      const q = query.toLowerCase();
      return (agent.name || '').toLowerCase().includes(q)
        || (agent.nickname || '').toLowerCase().includes(q);
    }

    /* ------------------------- Styles ------------------------- */
    const baseStyle = { fontFamily: "'Manrope', system-ui, sans-serif" };
    const displayFont = { fontFamily: "'Fraunces', Georgia, serif", fontWeight: 500, fontVariationSettings: "'opsz' 144" };

    const globalCss = `
      input[type="number"] { -moz-appearance: textfield; }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      .tabular-nums { font-variant-numeric: tabular-nums; }
    `;


    /* ============================================================
       AUTH WRAPPER
       ============================================================ */
    function ConfigErrorScreen() {
      return (
        <div style={{ fontFamily: "'Manrope', system-ui, sans-serif" }} className="min-h-screen bg-stone-100 flex items-center justify-center p-6">
          <div className="bg-white border border-stone-200 rounded-lg p-8 max-w-lg">
            <div className="flex items-center gap-2 mb-3 text-rose-600">
              <AlertCircle size={20} />
              <h1 className="text-xl font-semibold">Supabase niet geconfigureerd</h1>
            </div>
            <p className="text-sm text-stone-700 mb-3">
              Je moet eerst Supabase opzetten en de gegevens invullen in dit HTML-bestand. Open het bestand in een teksteditor en zoek bovenaan naar:
            </p>
            <pre className="bg-stone-100 p-3 rounded text-xs overflow-x-auto mb-3">
{`const SUPABASE_URL = 'https://YOUR-PROJECT-ID.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR-ANON-KEY-HERE';`}
            </pre>
            <p className="text-sm text-stone-700">Vul daar je eigen Supabase URL en anon key in. Volg de setup-handleiding voor de stappen.</p>
          </div>
        </div>
      );
    }

    function LoginScreen({ onLoggedIn }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [err, setErr] = useState('');
      const [busy, setBusy] = useState(false);

      async function submit(e) {
        e.preventDefault();
        setErr(''); setBusy(true);
        const { error } = await sb.auth.signInWithPassword({ email, password });
        setBusy(false);
        if (error) setErr(error.message);
      }

      return (
        <div style={{ fontFamily: "'Manrope', system-ui, sans-serif" }} className="min-h-screen bg-stone-100 flex items-center justify-center p-6">
          <form onSubmit={submit} className="bg-white border border-stone-200 rounded-lg p-8 max-w-sm w-full">
            <div className="flex items-center gap-2 mb-1">
              <div className="w-9 h-9 rounded bg-emerald-900 text-white flex items-center justify-center">
                <Building2 size={18} />
              </div>
              <h1 style={{ fontFamily: "'Fraunces', Georgia, serif", fontWeight: 500 }} className="text-2xl text-stone-900">Loondashboard</h1>
            </div>
            <p className="text-xs text-stone-500 mb-6 ml-11">Cloud · log in om door te gaan</p>

            <div className="mb-3">
              <label className="text-xs text-stone-500 uppercase tracking-wider font-medium block mb-1.5">Email</label>
              <input type="email" required value={email} onChange={e => setEmail(e.target.value)}
                className="w-full px-3 py-2 text-sm border border-stone-200 rounded bg-white outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700/20" />
            </div>
            <div className="mb-4">
              <label className="text-xs text-stone-500 uppercase tracking-wider font-medium block mb-1.5">Wachtwoord</label>
              <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                className="w-full px-3 py-2 text-sm border border-stone-200 rounded bg-white outline-none focus:border-emerald-700 focus:ring-1 focus:ring-emerald-700/20" />
            </div>

            {err && <div className="mb-3 p-2 text-xs text-rose-700 bg-rose-50 border border-rose-200 rounded">{err}</div>}

            <button type="submit" disabled={busy}
              className="w-full px-4 py-2 bg-emerald-900 text-white rounded hover:bg-emerald-800 text-sm font-medium disabled:opacity-50">
              {busy ? 'Bezig…' : 'Inloggen'}
            </button>

            <p className="text-xs text-stone-500 mt-4 text-center">
              Geen account? Vraag de beheerder om je toe te voegen via Supabase.
            </p>
          </form>
        </div>
      );
    }

    function CloudHeader({ user, onLogout }) {
      const [open, setOpen] = useState(false);
      return (
        <div className="bg-emerald-900 text-emerald-50 text-xs">
          <div className="max-w-6xl mx-auto px-6 py-1.5 flex items-center justify-between">
            <div className="flex items-center gap-1.5">
              <Cloud size={12} />
              <span>Cloud · alle wijzigingen worden gedeeld</span>
            </div>
            <div className="relative">
              <button onClick={() => setOpen(o => !o)} className="hover:text-white">
                {user.email}
              </button>
              {open && (
                <div className="absolute right-0 top-full mt-1 bg-white text-stone-800 rounded shadow-lg border border-stone-200 py-1 min-w-[180px] z-50">
                  <button onClick={() => { setOpen(false); window.exportPayrollData(); }}
                    className="w-full text-left px-3 py-1.5 text-sm hover:bg-stone-50 flex items-center gap-2">
                    <Download size={13} /> Backup downloaden
                  </button>
                  <button onClick={() => { setOpen(false); onLogout(); }}
                    className="w-full text-left px-3 py-1.5 text-sm hover:bg-stone-50 flex items-center gap-2 text-rose-700">
                    <LogOut size={13} /> Uitloggen
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function CloudApp() {
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      useEffect(() => {
        if (!sb) { setAuthLoading(false); return; }
        sb.auth.getSession().then(({ data }) => {
          setUser(data.session?.user || null);
          setAuthLoading(false);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user || null);
        });
        return () => subscription?.unsubscribe();
      }, []);

      if (!isConfigured) return <ConfigErrorScreen />;
      if (authLoading) return <div style={{ fontFamily: "'Manrope', system-ui, sans-serif" }} className="min-h-screen flex items-center justify-center bg-stone-100 text-stone-500">Bezig met laden…</div>;
      if (!user) return <LoginScreen />;

      return (
        <>
          <CloudHeader user={user} onLogout={() => sb.auth.signOut()} />
          <PayrollDashboard />
        </>
      );
    }

    /* === Render === */
    ReactDOM.createRoot(document.getElementById('root')).render(<CloudApp />);
  </script>
</body>
</html>
